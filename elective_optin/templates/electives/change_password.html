{% extends 'base.html' %}
{% block title %}Change Password — EduElect{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-12 col-sm-9 col-md-6 col-lg-4">
    <div class="card p-4">
      <div class="text-center mb-4">
        <div style="font-size:2rem;">🔑</div>
        <h4 style="font-weight:700; margin:.5rem 0 .2rem;">Set New Password</h4>
        <p style="font-size:.85rem; color:#888;">You must change your password before continuing</p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control" placeholder="Choose a strong password" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
